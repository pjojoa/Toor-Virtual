<!DOCTYPE html>
<html>
<head>
<title>Recorrido virtual Fiorino</title>
<meta charset="utf-8">
<meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
<style> @-ms-viewport { width: device-width; } </style>
<link rel="stylesheet" href="vendor/reset.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="tour-navigation-bar.css">
</head>
<body class="multiple-scenes ">

<div id="pano"></div>

<a id="brandLogo" href="https://marval.com.co/" target="_blank" rel="noopener noreferrer" aria-label="Abrir sitio de MARVAL">
  <span class="brandLogo-chip"></span>
  <img src="img/logo-marval.png" alt="MARVAL" class="brandLogo-mark">
</a>

<a href="javascript:void(0)" id="floorPlanToggle" aria-label="Abrir plano">
  <img class="icon" src="img/icono-plano.jpg" alt="Plano">
</a>

<!-- Barra de navegación inferior (reemplaza sceneListToggle, autorotateToggle, fullscreenToggle) -->
<nav id="tour-navigation-bar" class="tour-navigation-bar" aria-label="Controles del tour" aria-hidden="true">
  <div class="tour-nav-inner">
    <button type="button" class="tour-nav-btn" id="tour-nav-prev" aria-label="Escena anterior" title="Escena anterior"><i class="fas fa-angles-left" aria-hidden="true"></i></button>

    <div class="tour-nav-middle" aria-hidden="false">
      <div class="tour-nav-group tour-nav-group-left">
        <button type="button" class="tour-nav-btn" id="tour-nav-grid" aria-label="Mostrar miniaturas" title="Miniaturas"><i class="fas fa-th-large" aria-hidden="true"></i></button>
      </div>
      <div class="tour-nav-group tour-nav-group-center">
        <button type="button" class="tour-nav-btn tour-nav-btn-play" id="tour-nav-play" aria-label="Rotación automática" title="Play"><i class="fas fa-play" aria-hidden="true"></i></button>
        <button type="button" class="tour-nav-btn tour-nav-btn-pause" id="tour-nav-pause" aria-label="Pausar rotación" title="Pausar"><i class="fas fa-pause" aria-hidden="true"></i></button>
      </div>
      <div class="tour-nav-group tour-nav-group-right">
        <button type="button" class="tour-nav-btn" id="tour-nav-zoom-out" aria-label="Zoom menos" title="Zoom -"><i class="fas fa-minus" aria-hidden="true"></i></button>
        <button type="button" class="tour-nav-btn" id="tour-nav-zoom-in" aria-label="Zoom más" title="Zoom +"><i class="fas fa-plus" aria-hidden="true"></i></button>
        <button type="button" class="tour-nav-btn" id="tour-nav-reset" aria-label="Reiniciar vista" title="Reiniciar vista"><i class="fas fa-rotate-right" aria-hidden="true"></i></button>
        <button type="button" class="tour-nav-btn" id="tour-nav-fullscreen" aria-label="Pantalla completa" title="Pantalla completa"><i class="fas fa-expand" aria-hidden="true"></i></button>
      </div>
    </div>

    <button type="button" class="tour-nav-btn" id="tour-nav-next" aria-label="Escena siguiente" title="Escena siguiente"><i class="fas fa-angles-right" aria-hidden="true"></i></button>
  </div>
</nav>

<a href="javascript:void(0)" id="viewUp" class="viewControlButton viewControlButton-1">
  <img class="icon" src="img/up.png">
</a>
<a href="javascript:void(0)" id="viewDown" class="viewControlButton viewControlButton-2">
  <img class="icon" src="img/down.png">
</a>
<a href="javascript:void(0)" id="viewLeft" class="viewControlButton viewControlButton-3">
  <img class="icon" src="img/left.png">
</a>
<a href="javascript:void(0)" id="viewRight" class="viewControlButton viewControlButton-4">
  <img class="icon" src="img/right.png">
</a>
<a href="javascript:void(0)" id="viewIn" class="viewControlButton viewControlButton-5">
  <img class="icon" src="img/plus.png">
</a>
<a href="javascript:void(0)" id="viewOut" class="viewControlButton viewControlButton-6">
  <img class="icon" src="img/minus.png">
</a>

<div id="galleryOverlay" class="galleryOverlay" aria-hidden="true">
  <div class="galleryOverlay-backdrop" data-gallery-close="true"></div>
  <div class="galleryOverlay-panel" role="dialog" aria-modal="true" aria-label="Galería">
    <button class="galleryArrow galleryArrow-prev" id="gallery-arrow-prev" aria-label="Miniaturas anteriores"><i class="fas fa-chevron-left" aria-hidden="true"></i></button>
    <div class="galleryOverlay-strip" id="galleryStrip" aria-label="Lista de fotos"></div>
    <button class="galleryArrow galleryArrow-next" id="gallery-arrow-next" aria-label="Miniaturas siguientes"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
  </div>
</div>

<div id="floorPlanOverlay" class="floorPlanOverlay" aria-hidden="true">
  <div class="floorPlanOverlay-backdrop"></div>
  <div class="floorPlanOverlay-panel" role="dialog" aria-modal="true" aria-label="Plano">
    <div class="floorPlanOverlay-header">
      <button class="floorPlanOverlay-close" type="button" data-floorplan-close="true" aria-label="Cerrar">×</button>
    </div>
    <div class="floorPlanCanvas" aria-label="Plano del apartamento">
      <img id="floorPlanImage" src="img/plano-apartamento.png" alt="Plano del apartamento">
      <div id="floorPlanMarkers" class="floorPlan-markers" aria-hidden="true"></div>
    </div>
  </div>
</div>

<script src="vendor/screenfull.min.js" ></script>
<script src="vendor/bowser.min.js" ></script>
<script src="vendor/marzipano.js" ></script>
<script src="data.js"></script>
<script src="tour-navigation-bar.js"></script>
<script src="index.js"></script>

</body>
</html>
